# Shared git-cliff configuration for Stellarrion Rust projects.
# Override per-repo if needed.
#
# https://git-cliff.org/docs/configuration

[changelog]
header = "# Changelog\n\nAll notable changes are documented here.\n"
body = """
{%- if version -%}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{%- else -%}\
    ## [unreleased]
{%- endif -%}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}\
          {{ commit.message | upper_first }}\
          {% if commit.github.pr_number %} ([#{{ commit.github.pr_number }}]({{ commit.github.pr_url }})){% endif %}\
    {%- endfor %}
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = false
commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^docs", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Maintenance" },
    { message = "^security", group = "Security" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "st-zrt-v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

[github]
owner = "Stellarrion"
repo = "st-zrt"
