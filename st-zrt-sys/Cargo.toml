[package]
name = "st-zrt-sys"
# Version-mirrors libonnxruntime exactly (the "same version as official onnxruntime" rule).
version = "1.26.0"
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
publish = true
links = "onnxruntime"
build = "build.rs"
description = "Hand-written FFI to onnxruntime (libonnxruntime). Stellarrion st-zrt: from-scratch, zrt-namespaced, no bindgen."
documentation = "https://docs.rs/st-zrt-sys"
readme = "README.md"
keywords = ["onnx", "onnxruntime", "ffi", "bindings"]
categories = ["external-ffi-bindings", "api-bindings", "science"]

[lints]
workspace = true

# No bindgen: OrtApi's macro-defined function table can't be parsed by it, and we want
# no legacy Ort* names. The FFI is generated by `st-zrt-sys-codegen` (our own preprocessor
# + parser) into src/generated.rs, against the C ABI contract.
[features]
default = []
# Off-by-default domains (full CPU inference is always available with no features):
ep = []          # GPU/accelerator execution-provider options (CUDA/TRT/DNNL/CANN/ROCm/etc.)
training = []    # training API
custom-ops = []  # custom-op kernel authoring (writing kernels; loading libs stays core)
model-editor = [] # sub-API getters / graph editing
# GPU build: download the GPU libonnxruntime (CUDA EP) + the CUDA 12 runtime libs (linux-x64).
cuda = []

[build-dependencies]
# Pure-Rust download / verify / extract - no system curl, tar, or sha256sum. This is
# what makes the build reproducible across Linux/macOS/Windows runners.
ureq = "2.12"
sha2 = "0.10"
hex = "0.4"
flate2 = "1"
tar = "0.4"
zip = "2"
