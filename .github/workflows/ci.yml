name: CI

on:
  push:
    branches: [main]
    tags: ["st-zrt-v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  rust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy -p st-zrt --all-targets -- -D warnings

      - name: Test default feature set
        run: cargo test -p st-zrt

      - name: Test serde session options
        run: cargo test -p st-zrt --features serde session_options

      - name: Test model-editor graph augmentation
        run: cargo test -p st-zrt --features model-editor apply_model_fragment_to_existing_output

      - name: Check extension feature surface
        run: cargo check -p st-zrt --features model-editor,serde,ep,custom-ops
